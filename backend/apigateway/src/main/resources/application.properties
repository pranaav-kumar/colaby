spring.application.name=apigateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ---- Redis (for rate limiter) ----
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ---- Timeouts ----
spring.cloud.gateway.server.webflux.httpclient.connect-timeout=3000
spring.cloud.gateway.server.webflux.httpclient.response-timeout=5s

# ---- Routes ----
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTHSERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RequestRateLimiter=redis-rate-limiter.replenishRate=10,redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.server.webflux.routes[0].filters[1]=CircuitBreaker=name=authCB,fallbackuri=forward:/fallback/auth

spring.cloud.gateway.server.webflux.routes[1].id=user-details-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://USERDETAILSSERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/users/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=RequestRateLimiter=redis-rate-limiter.replenishRate=10,redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.server.webflux.routes[1].filters[1]=CircuitBreaker=name=userDetailsCB,fallbackuri=forward:/fallback/users

spring.cloud.gateway.server.webflux.routes[2].id=profile-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://PROFILESERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/profiles/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=RequestRateLimiter=redis-rate-limiter.replenishRate=10,redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.server.webflux.routes[2].filters[1]=CircuitBreaker=name=profileCB,fallbackuri=forward:/fallback/profiles

# ---- CORS ----
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true

# ---- Actuator lockdown ----
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
